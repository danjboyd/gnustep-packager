name: validate-repo

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  windows-validation:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install MSYS2 CLANG64 Prerequisites
        id: msys2
        uses: msys2/setup-msys2@v2
        with:
          msystem: CLANG64
          update: true
          install: >-
            curl
            tar
            gzip
            mingw-w64-clang-x86_64-clang

      - name: Expose MSYS2 Toolchain
        run: |
          "MSYS2_LOCATION=${{ steps.msys2.outputs.msys2-location }}" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          (Join-Path '${{ steps.msys2.outputs.msys2-location }}' 'clang64\bin') | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      - name: Bootstrap And Smoke Test gnustep-cli-new
        shell: msys2 {0}
        run: |
          set -euo pipefail
          export GP_GNUSTEP_CLI_ROOT="$(cygpath -u '${{ runner.temp }}')/gnustep-cli-new"
          export GP_GNUSTEP_CLI_LOG_ROOT="$(cygpath -u '${{ github.workspace }}')/dist/logs/gnustep-cli-new"
          export GP_GNUSTEP_CLI_SMOKE_ROOT="$(cygpath -u '${{ runner.temp }}')/gnustep-cli-new-smoke"
          export GP_GNUSTEP_CLI_HOST_KIND="windows-msys2-clang64"
          ./scripts/ci/gnustep-cli-new-bootstrap-smoke.sh
          {
            cygpath -w "${GP_GNUSTEP_CLI_ROOT}/bin"
            cygpath -w "${GP_GNUSTEP_CLI_ROOT}/Tools"
            cygpath -w "${GP_GNUSTEP_CLI_ROOT}/System/Tools"
          } >> "$GITHUB_PATH"
          {
            echo "GP_GNUSTEP_CLI_ROOT=$(cygpath -w "${GP_GNUSTEP_CLI_ROOT}")"
            echo "GP_GNUSTEP_CLI_MANIFEST_URL=${GP_GNUSTEP_CLI_MANIFEST_URL:-https://github.com/danjboyd/gnustep-cli-new/releases/download/v0.1.0-dev/release-manifest.json}"
          } >> "$GITHUB_ENV"

      - name: Validate Example Manifest
        run: |
          ./scripts/gnustep-packager.ps1 -Command manifest-check -Manifest examples/sample-gui/package.manifest.json

      - name: Resolve Example Manifest
        run: |
          ./scripts/gnustep-packager.ps1 -Command resolve-manifest -Manifest examples/sample-gui/package.manifest.json

      - name: Describe Example Manifest
        run: |
          ./scripts/gnustep-packager.ps1 -Command describe -Manifest examples/sample-gui/package.manifest.json

      - name: Run Pester Regression Tests
        run: |
          ./scripts/test-repo.ps1 -CI

      - name: Run Shared Packaging Pipeline
        run: |
          ./scripts/run-packaging-pipeline.ps1 -Manifest examples/sample-gui/package.manifest.json -Backend msi -RunSmoke

  linux-validation:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux Prerequisites
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y ca-certificates curl tar gzip squashfs-tools desktop-file-utils

      - name: Bootstrap And Smoke Test gnustep-cli-new
        shell: bash
        run: |
          set -euo pipefail
          export GP_GNUSTEP_CLI_ROOT="${RUNNER_TEMP}/gnustep-cli-new"
          export GP_GNUSTEP_CLI_LOG_ROOT="${GITHUB_WORKSPACE}/dist/logs/gnustep-cli-new"
          export GP_GNUSTEP_CLI_SMOKE_ROOT="${RUNNER_TEMP}/gnustep-cli-new-smoke"
          export GP_GNUSTEP_CLI_HOST_KIND="linux-ubuntu-appimage"
          ./scripts/ci/gnustep-cli-new-bootstrap-smoke.sh
          {
            echo "${GP_GNUSTEP_CLI_ROOT}/bin"
            echo "${GP_GNUSTEP_CLI_ROOT}/Tools"
            echo "${GP_GNUSTEP_CLI_ROOT}/System/Tools"
          } >> "$GITHUB_PATH"
          {
            echo "GP_GNUSTEP_CLI_ROOT=${GP_GNUSTEP_CLI_ROOT}"
            echo "GP_GNUSTEP_CLI_MANIFEST_URL=${GP_GNUSTEP_CLI_MANIFEST_URL:-https://github.com/danjboyd/gnustep-cli-new/releases/download/v0.1.0-dev/release-manifest.json}"
          } >> "$GITHUB_ENV"

      - name: Validate Linux Example Manifest
        run: |
          ./scripts/gnustep-packager.ps1 -Command manifest-check -Manifest examples/sample-linux/package.manifest.json

      - name: Resolve Linux Example Manifest
        run: |
          ./scripts/gnustep-packager.ps1 -Command resolve-manifest -Manifest examples/sample-linux/package.manifest.json

      - name: Describe Linux Example Manifest
        run: |
          ./scripts/gnustep-packager.ps1 -Command describe -Manifest examples/sample-linux/package.manifest.json

      - name: Run Pester Regression Tests
        run: |
          ./scripts/test-repo.ps1 -CI

      - name: Run Shared Packaging Pipeline
        run: |
          ./scripts/run-packaging-pipeline.ps1 -Manifest examples/sample-linux/package.manifest.json -Backend appimage -RunSmoke
