name: package-gnustep-app

on:
  workflow_call:
    inputs:
      manifest-path:
        required: true
        type: string
      backend:
        required: false
        type: string
        default: msi
      package-version:
        required: false
        type: string
        default: ""
      packager-repository:
        required: false
        type: string
        default: ""
      packager-ref:
        required: false
        type: string
        default: ""
      runs-on-msi:
        required: false
        type: string
        default: '["windows-latest"]'
      runs-on-appimage:
        required: false
        type: string
        default: '["ubuntu-latest"]'
      skip-default-host-setup:
        required: false
        type: boolean
        default: false
      msys2-packages:
        required: false
        type: string
        default: ""
      appimage-apt-packages:
        required: false
        type: string
        default: "ca-certificates curl tar gzip squashfs-tools desktop-file-utils"
      gnustep-cli-manifest-url:
        required: false
        type: string
        default: "https://github.com/danjboyd/gnustep-cli-new/releases/download/v0.1.0-dev/release-manifest.json"
      gnustep-cli-bootstrap-url:
        required: false
        type: string
        default: "https://raw.githubusercontent.com/danjboyd/gnustep-cli-new/master/scripts/bootstrap/gnustep-bootstrap.sh"
      gnustep-cli-root:
        required: false
        type: string
        default: ""
      preflight-shell:
        required: false
        type: string
        default: pwsh
      preflight-command:
        required: false
        type: string
        default: ""
      run-validation:
        required: false
        type: boolean
        default: true
      run-smoke:
        required: false
        type: boolean
        default: false
      upload-artifacts:
        required: false
        type: boolean
        default: true
      artifact-name:
        required: false
        type: string
        default: gnustep-package
      artifact-retention-days:
        required: false
        type: number
        default: 7
      sign-artifacts:
        required: false
        type: boolean
        default: false
      sign-timestamp-url:
        required: false
        type: string
        default: ""
    secrets:
      sign_pfx_base64:
        required: false
      sign_pfx_password:
        required: false
      sign_cert_sha1:
        required: false
    outputs:
      resolved-version:
        description: Resolved package version after defaults and optional override.
        value: ${{ jobs.package.outputs.resolved-version }}
      package-root:
        description: Resolved package output root.
        value: ${{ jobs.package.outputs.package-root }}
      log-root:
        description: Resolved log output root.
        value: ${{ jobs.package.outputs.log-root }}
      validation-root:
        description: Resolved validation output root.
        value: ${{ jobs.package.outputs.validation-root }}

jobs:
  package:
    runs-on: ${{ fromJSON(inputs.backend == 'appimage' && inputs.runs-on-appimage || inputs.runs-on-msi) }}
    outputs:
      resolved-version: ${{ steps.manifest.outputs.resolved_version }}
      package-root: ${{ steps.manifest.outputs.package_root }}
      log-root: ${{ steps.manifest.outputs.log_root }}
      validation-root: ${{ steps.manifest.outputs.validation_root }}
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout Consumer Repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Resolve Packager Checkout
        id: packager
        run: |
          $repository = '${{ inputs.packager-repository }}'
          $ref = '${{ inputs.packager-ref }}'
          if (-not [string]::IsNullOrWhiteSpace($repository) -and -not [string]::IsNullOrWhiteSpace($ref)) {
            "repository=$repository" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
            "ref=$ref" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
            exit 0
          }

          $workflowRef = '${{ github.workflow_ref }}'
          if ($workflowRef -notmatch '^([^/]+/[^/]+)/\.github/workflows/[^@]+@(.+)$') {
            throw "Unable to resolve packager checkout. Provide packager-repository and packager-ref inputs."
          }
          "repository=$($Matches[1])" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "ref=$($Matches[2])" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Checkout Packager Repo
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.packager.outputs.repository }}
          ref: ${{ steps.packager.outputs.ref }}
          path: .gnustep-packager-toolkit

      - name: Resolve Manifest Outputs And Host Dependencies
        id: manifest
        run: |
          $toolRoot = Join-Path $env:GITHUB_WORKSPACE ".gnustep-packager-toolkit"
          $manifestPath = [System.IO.Path]::GetFullPath((Join-Path $env:GITHUB_WORKSPACE '${{ inputs.manifest-path }}'))
          $coreScript = [System.IO.Path]::GetFullPath((Join-Path $toolRoot 'scripts\lib\core.ps1'))
          if (-not (Test-Path -LiteralPath $coreScript)) {
            throw "gnustep-packager core library not found at $coreScript"
          }
          . $coreScript
          $context = Get-GpManifestContext -Path $manifestPath -PackageVersion '${{ inputs.package-version }}'
          $manifest = $context.Manifest
          $manifestRoot = Split-Path -Parent $manifestPath
          $hostSetupPlanArgs = @{
            Context = $context
            Backend = '${{ inputs.backend }}'
            AdditionalMsys2Packages = '${{ inputs.msys2-packages }}'
            AdditionalAptPackages = '${{ inputs.appimage-apt-packages }}'
          }
          if ($${{ inputs.skip-default-host-setup }}) {
            $hostSetupPlanArgs.SkipDefaultHostSetup = $true
          }
          $hostSetupPlan = Get-GpWorkflowHostSetupPlan @hostSetupPlanArgs

          if (@($hostSetupPlan.Errors).Count -gt 0) {
            throw ([string]::Join(" ", @($hostSetupPlan.Errors)))
          }

          function Resolve-OutputPath([string]$basePath, [string]$value) {
            if ([System.IO.Path]::IsPathRooted($value)) {
              return [System.IO.Path]::GetFullPath($value)
            }
            return [System.IO.Path]::GetFullPath((Join-Path $basePath $value))
          }

          "resolved_version=$($manifest.package.version)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "package_root=$(Resolve-OutputPath $manifestRoot $manifest.outputs.packageRoot)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "log_root=$(Resolve-OutputPath $manifestRoot $manifest.outputs.logRoot)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "validation_root=$(Resolve-OutputPath $manifestRoot $manifest.outputs.validationRoot)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "manifest_msys2_packages=$($hostSetupPlan.ManifestMsys2PackageText)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "manifest_apt_packages=$($hostSetupPlan.ManifestAptPackageText)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "resolved_msys2_packages=$($hostSetupPlan.ResolvedMsys2PackageText)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "resolved_apt_packages=$($hostSetupPlan.ResolvedAptPackageText)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "host_setup_mode=$($hostSetupPlan.HostSetupMode)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "host_setup_summary=$($hostSetupPlan.Summary)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          Write-Host $hostSetupPlan.Summary

      - name: Install MSYS2 Bootstrap Shell
        if: ${{ inputs.backend == 'msi' && !inputs.skip-default-host-setup }}
        id: msys2
        uses: msys2/setup-msys2@v2
        with:
          msystem: CLANG64
          update: true
          install: >-
            curl
            tar
            gzip
            ${{ steps.manifest.outputs.resolved_msys2_packages }}

      - name: Expose MSYS2 Toolchain
        if: ${{ inputs.backend == 'msi' && !inputs.skip-default-host-setup }}
        run: |
          "MSYS2_LOCATION=${{ steps.msys2.outputs.msys2-location }}" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          (Join-Path '${{ steps.msys2.outputs.msys2-location }}' 'clang64\bin') | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      - name: Bootstrap And Smoke Test gnustep-cli-new For MSI
        if: ${{ inputs.backend == 'msi' && !inputs.skip-default-host-setup }}
        shell: pwsh
        env:
          GP_GNUSTEP_CLI_MANIFEST_URL: ${{ inputs.gnustep-cli-manifest-url }}
          GP_GNUSTEP_CLI_BOOTSTRAP_URL: ${{ inputs.gnustep-cli-bootstrap-url }}
          GP_GNUSTEP_CLI_ROOT: ${{ inputs.gnustep-cli-root }}
          GP_GNUSTEP_CLI_LOG_ROOT: ${{ steps.manifest.outputs.log_root }}\gnustep-cli-new
          GP_GNUSTEP_CLI_SMOKE_ROOT: ${{ runner.temp }}\gnustep-cli-new-smoke
          GP_GNUSTEP_CLI_HOST_KIND: windows-msys2-clang64
        run: |
          $ErrorActionPreference = "Stop"

          function Invoke-Logged {
            param(
              [Parameter(Mandatory = $true)][string]$LogPath,
              [Parameter(Mandatory = $true)][scriptblock]$Command
            )
            New-Item -ItemType Directory -Force -Path (Split-Path -Parent $LogPath) | Out-Null
            try {
              $global:LASTEXITCODE = 0
              & $Command *>&1 | Tee-Object -FilePath $LogPath
              if ($global:LASTEXITCODE -ne 0) {
                throw "command exited with $global:LASTEXITCODE"
              }
            }
            catch {
              "ERROR: $($_.Exception.Message)" | Tee-Object -FilePath $LogPath -Append
              throw
            }
          }

          function Write-BootstrapReport {
            param([string]$Status)
            $reportPath = Join-Path $env:GP_GNUSTEP_CLI_LOG_ROOT "gnustep-cli-new-blocker-report.md"
            $logFiles = @(
              "gnustep-cli-new-host-context.log",
              "gnustep-cli-new-selection.log",
              "gnustep-cli-new-bootstrap-download.log",
              "gnustep-cli-new-setup.log",
              "gnustep-cli-new-path-context.log",
              "gnustep-cli-new-version.log",
              "gnustep-cli-new-doctor.json",
              "gnustep-cli-new-new.json",
              "gnustep-cli-new-build.json",
              "gnustep-cli-new-run.json"
            )
            $lines = [System.Collections.Generic.List[string]]::new()
            $lines.Add("# gnustep-cli-new Bootstrap Report")
            $lines.Add("")
            $lines.Add("- status: $Status")
            $lines.Add("- host: $([System.Environment]::OSVersion.VersionString)")
            $lines.Add("- manifest: $env:GP_GNUSTEP_CLI_MANIFEST_URL")
            $lines.Add("- bootstrap: $env:GP_GNUSTEP_CLI_BOOTSTRAP_URL")
            $lines.Add("- install root: $env:GP_GNUSTEP_CLI_ROOT")
            $lines.Add("- host kind: $env:GP_GNUSTEP_CLI_HOST_KIND")
            $lines.Add("- log root: $env:GP_GNUSTEP_CLI_LOG_ROOT")
            $lines.Add("")
            foreach ($name in $logFiles) {
              $path = Join-Path $env:GP_GNUSTEP_CLI_LOG_ROOT $name
              if (-not (Test-Path -LiteralPath $path)) { continue }
              $lines.Add("## $name")
              $lines.Add("")
              $lines.Add("``````text")
              $lines.AddRange([string[]](Get-Content -LiteralPath $path -Tail 120))
              $lines.Add("``````")
              $lines.Add("")
            }
            Set-Content -Path $reportPath -Value $lines -Encoding UTF8
          }

          if ([string]::IsNullOrWhiteSpace($env:GP_GNUSTEP_CLI_ROOT)) {
            $env:GP_GNUSTEP_CLI_ROOT = Join-Path '${{ runner.temp }}' 'gnustep-cli-new'
          }
          New-Item -ItemType Directory -Force -Path $env:GP_GNUSTEP_CLI_LOG_ROOT | Out-Null
          New-Item -ItemType Directory -Force -Path $env:GP_GNUSTEP_CLI_SMOKE_ROOT | Out-Null

          @(
            "timestamp=$([DateTimeOffset]::UtcNow.ToString("o"))",
            "runner_os=$env:RUNNER_OS",
            "host_kind=$env:GP_GNUSTEP_CLI_HOST_KIND",
            "github_workflow=$env:GITHUB_WORKFLOW",
            "github_run_id=$env:GITHUB_RUN_ID",
            "github_ref=$env:GITHUB_REF",
            "install_root=$env:GP_GNUSTEP_CLI_ROOT",
            "log_root=$env:GP_GNUSTEP_CLI_LOG_ROOT",
            "smoke_root=$env:GP_GNUSTEP_CLI_SMOKE_ROOT",
            "msys2_location=${{ steps.msys2.outputs.msys2-location }}",
            "",
            "PATH entries:",
            ($env:PATH -split ';' -join [Environment]::NewLine)
          ) | Set-Content -Path (Join-Path $env:GP_GNUSTEP_CLI_LOG_ROOT "gnustep-cli-new-host-context.log") -Encoding UTF8

          $bootstrapUrl = $env:GP_GNUSTEP_CLI_BOOTSTRAP_URL -replace 'gnustep-bootstrap\.sh$', 'gnustep-bootstrap.ps1'
          $bootstrapPath = Join-Path $env:GP_GNUSTEP_CLI_SMOKE_ROOT "gnustep-bootstrap.ps1"
          @(
            "gnustep-cli-new manifest: $env:GP_GNUSTEP_CLI_MANIFEST_URL",
            "gnustep-cli-new bootstrap: $bootstrapUrl",
            "gnustep-cli-new root: $env:GP_GNUSTEP_CLI_ROOT"
          ) | Tee-Object -FilePath (Join-Path $env:GP_GNUSTEP_CLI_LOG_ROOT "gnustep-cli-new-selection.log")

          try {
            Invoke-Logged (Join-Path $env:GP_GNUSTEP_CLI_LOG_ROOT "gnustep-cli-new-bootstrap-download.log") {
              Invoke-WebRequest -UseBasicParsing -Uri $bootstrapUrl -OutFile $bootstrapPath
            }
            Invoke-Logged (Join-Path $env:GP_GNUSTEP_CLI_LOG_ROOT "gnustep-cli-new-setup.log") {
              & pwsh -NoProfile -ExecutionPolicy Bypass -File $bootstrapPath --json --yes setup --user --root $env:GP_GNUSTEP_CLI_ROOT --manifest $env:GP_GNUSTEP_CLI_MANIFEST_URL
            }

            $toolPaths = @(
              (Join-Path $env:GP_GNUSTEP_CLI_ROOT "bin"),
              (Join-Path $env:GP_GNUSTEP_CLI_ROOT "Tools"),
              (Join-Path $env:GP_GNUSTEP_CLI_ROOT "System\Tools"),
              (Join-Path $env:GP_GNUSTEP_CLI_ROOT "usr\bin"),
              (Join-Path $env:GP_GNUSTEP_CLI_ROOT "clang64\bin")
            )
            $env:PATH = ([string]::Join(';', $toolPaths + @($env:PATH)))
            @(
              "timestamp=$([DateTimeOffset]::UtcNow.ToString("o"))",
              "PATH entries:",
              ($env:PATH -split ';' -join [Environment]::NewLine),
              "",
              "command lookup:",
              "gnustep=$((Get-Command gnustep -ErrorAction SilentlyContinue).Source)",
              "bash=$((Get-Command bash -ErrorAction SilentlyContinue).Source)",
              "make=$((Get-Command make -ErrorAction SilentlyContinue).Source)",
              "clang=$((Get-Command clang -ErrorAction SilentlyContinue).Source)"
            ) | Set-Content -Path (Join-Path $env:GP_GNUSTEP_CLI_LOG_ROOT "gnustep-cli-new-path-context.log") -Encoding UTF8

            Invoke-Logged (Join-Path $env:GP_GNUSTEP_CLI_LOG_ROOT "gnustep-cli-new-version.log") { & gnustep --version }
            Invoke-Logged (Join-Path $env:GP_GNUSTEP_CLI_LOG_ROOT "gnustep-cli-new-doctor.json") { & gnustep doctor --json --manifest $env:GP_GNUSTEP_CLI_MANIFEST_URL }

            $workRoot = Join-Path $env:GP_GNUSTEP_CLI_SMOKE_ROOT "work"
            Remove-Item -Recurse -Force -ErrorAction SilentlyContinue $workRoot
            New-Item -ItemType Directory -Force -Path $workRoot | Out-Null
            Push-Location $workRoot
            try {
              Invoke-Logged (Join-Path $env:GP_GNUSTEP_CLI_LOG_ROOT "gnustep-cli-new-new.json") { & gnustep new cli-tool HelloPackager --json }
              Push-Location (Join-Path $workRoot "HelloPackager")
              try {
                Invoke-Logged (Join-Path $env:GP_GNUSTEP_CLI_LOG_ROOT "gnustep-cli-new-build.json") { & gnustep build --json }
                Invoke-Logged (Join-Path $env:GP_GNUSTEP_CLI_LOG_ROOT "gnustep-cli-new-run.json") { & gnustep run --json }
              }
              finally {
                Pop-Location
              }
            }
            finally {
              Pop-Location
            }
            Write-BootstrapReport "passed"
          }
          catch {
            Write-BootstrapReport "failed"
            throw
          }

          $toolPaths | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8
          "GP_GNUSTEP_CLI_ROOT=$env:GP_GNUSTEP_CLI_ROOT" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "GP_GNUSTEP_CLI_MANIFEST_URL=$env:GP_GNUSTEP_CLI_MANIFEST_URL" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "MSYS2_LOCATION=${{ steps.msys2.outputs.msys2-location }}" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Install Linux AppImage Prerequisites
        if: ${{ inputs.backend == 'appimage' && !inputs.skip-default-host-setup }}
        shell: bash
        run: |
          set -euo pipefail
          packages='${{ steps.manifest.outputs.resolved_apt_packages }}'
          if [ -z "$packages" ]; then
            exit 0
          fi
          sudo apt-get update
          sudo apt-get install -y $packages

      - name: Bootstrap And Smoke Test gnustep-cli-new
        if: ${{ inputs.backend == 'appimage' && !inputs.skip-default-host-setup }}
        shell: bash
        env:
          GP_GNUSTEP_CLI_MANIFEST_URL: ${{ inputs.gnustep-cli-manifest-url }}
          GP_GNUSTEP_CLI_BOOTSTRAP_URL: ${{ inputs.gnustep-cli-bootstrap-url }}
          GP_GNUSTEP_CLI_ROOT: ${{ inputs.gnustep-cli-root }}
          GP_GNUSTEP_CLI_LOG_ROOT: ${{ steps.manifest.outputs.log_root }}/gnustep-cli-new
          GP_GNUSTEP_CLI_SMOKE_ROOT: ${{ runner.temp }}/gnustep-cli-new-smoke
          GP_GNUSTEP_CLI_HOST_KIND: linux-ubuntu-appimage
        run: |
          set -euo pipefail
          if [ -z "${GP_GNUSTEP_CLI_ROOT:-}" ]; then
            GP_GNUSTEP_CLI_ROOT="${RUNNER_TEMP}/gnustep-cli-new"
            export GP_GNUSTEP_CLI_ROOT
          fi
          ./.gnustep-packager-toolkit/scripts/ci/gnustep-cli-new-bootstrap-smoke.sh
          {
            echo "${GP_GNUSTEP_CLI_ROOT}/bin"
            echo "${GP_GNUSTEP_CLI_ROOT}/Tools"
            echo "${GP_GNUSTEP_CLI_ROOT}/System/Tools"
          } >> "$GITHUB_PATH"
          {
            echo "GP_GNUSTEP_CLI_ROOT=${GP_GNUSTEP_CLI_ROOT}"
            echo "GP_GNUSTEP_CLI_MANIFEST_URL=${GP_GNUSTEP_CLI_MANIFEST_URL}"
          } >> "$GITHUB_ENV"

      - name: Run Caller Preflight (pwsh)
        if: ${{ inputs.preflight-command != '' && inputs.preflight-shell == 'pwsh' }}
        shell: pwsh
        run: |
          ${{ inputs.preflight-command }}

      - name: Run Caller Preflight (bash)
        if: ${{ inputs.preflight-command != '' && inputs.preflight-shell == 'bash' }}
        shell: bash
        run: |
          set -euo pipefail
          ${{ inputs.preflight-command }}

      - name: Configure Signing Environment
        if: ${{ inputs.sign-artifacts && inputs.backend == 'msi' }}
        run: |
          "GP_SIGN_ENABLED=1" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          if (-not [string]::IsNullOrWhiteSpace('${{ inputs.sign-timestamp-url }}')) {
            "GP_SIGN_TIMESTAMP_URL=${{ inputs.sign-timestamp-url }}" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          }
          if (-not [string]::IsNullOrWhiteSpace('${{ secrets.sign_cert_sha1 }}')) {
            "GP_SIGN_CERT_SHA1=${{ secrets.sign_cert_sha1 }}" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          }
          if (-not [string]::IsNullOrWhiteSpace('${{ secrets.sign_pfx_password }}')) {
            "GP_SIGN_PFX_PASSWORD=${{ secrets.sign_pfx_password }}" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          }
          if (-not [string]::IsNullOrWhiteSpace('${{ secrets.sign_pfx_base64 }}')) {
            $tempRoot = Join-Path $env:RUNNER_TEMP "gnustep-packager-signing"
            New-Item -ItemType Directory -Force -Path $tempRoot | Out-Null
            $pfxPath = Join-Path $tempRoot "codesign.pfx"
            $pfxBytes = [System.Convert]::FromBase64String('${{ secrets.sign_pfx_base64 }}')
            [System.IO.File]::WriteAllBytes($pfxPath, $pfxBytes)
            "GP_SIGN_PFX_PATH=$pfxPath" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          }

      - name: Run Packaging Pipeline
        run: |
          $toolRoot = Join-Path $env:GITHUB_WORKSPACE ".gnustep-packager-toolkit"
          $manifestPath = [System.IO.Path]::GetFullPath((Join-Path $env:GITHUB_WORKSPACE '${{ inputs.manifest-path }}'))
          $parameters = @{
            Manifest = $manifestPath
            Backend = '${{ inputs.backend }}'
          }
          if (-not [string]::IsNullOrWhiteSpace('${{ inputs.package-version }}')) {
            $parameters['PackageVersion'] = '${{ inputs.package-version }}'
          }
          if ('${{ inputs.run-validation }}' -ne 'true') {
            $parameters['SkipBackendValidation'] = $true
          }
          if ('${{ inputs.run-smoke }}' -eq 'true') {
            $parameters['RunSmoke'] = $true
          }
          if ('${{ inputs.skip-default-host-setup }}' -ne 'true') {
            $parameters['InstallHostDependencies'] = $true
          }
          $pipelineScript = [System.IO.Path]::GetFullPath((Join-Path $toolRoot 'scripts\run-packaging-pipeline.ps1'))
          if (-not (Test-Path -LiteralPath $pipelineScript)) {
            throw "packaging pipeline entrypoint not found at $pipelineScript"
          }
          & $pipelineScript @parameters

      - name: Upload Package Artifacts
        if: ${{ inputs.upload-artifacts }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}-packages
          path: ${{ steps.manifest.outputs.package_root }}
          retention-days: ${{ inputs.artifact-retention-days }}
          if-no-files-found: error

      - name: Upload Logs
        if: ${{ always() && inputs.upload-artifacts }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}-logs
          path: ${{ steps.manifest.outputs.log_root }}
          retention-days: ${{ inputs.artifact-retention-days }}
          if-no-files-found: warn

      - name: Upload gnustep-cli-new Diagnostics
        if: ${{ always() && inputs.upload-artifacts }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}-gnustep-cli-new
          path: ${{ steps.manifest.outputs.log_root }}/gnustep-cli-new
          retention-days: ${{ inputs.artifact-retention-days }}
          if-no-files-found: warn

      - name: Upload Validation Output
        if: ${{ always() && inputs.upload-artifacts }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}-validation
          path: ${{ steps.manifest.outputs.validation_root }}
          retention-days: ${{ inputs.artifact-retention-days }}
          if-no-files-found: warn
